<script>
    // Particle System (Refined for Minimalist look)
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.init();
        }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1;
            this.speedY = Math.random() * 15 + 10; // High speed for "strike" feel
            this.alpha = Math.random() * 0.2;
        }
        update() {
            this.y += this.speedY;
            if (this.y > canvas.height) this.y = -10;
        }
        draw() {
            ctx.fillStyle = `rgba(255, 180, 170, ${this.alpha})`;
            ctx.fillRect(this.x, this.y, 1, 20); // Streaks instead of dots
        }
    }

    for (let i = 0; i < 40; i++) particles.push(new Particle());

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Interaction Scripts
    setTimeout(() => {
        const boot = document.getElementById('boot-screen');
        boot.style.opacity = '0';
        setTimeout(() => boot.style.display = 'none', 1000);
    }, 2000);

    function startGame() {
        const menu = document.getElementById('start-menu');
        const header = document.getElementById('hud-top');
        const footer = document.getElementById('hud-bottom');
        
        [menu, header, footer].forEach(el => {
            el.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
        });
        
        setTimeout(() => {
            alert('STRIKE SEQUENCE INITIATED');
            location.reload();
        }, 1000);
    }
</script>
