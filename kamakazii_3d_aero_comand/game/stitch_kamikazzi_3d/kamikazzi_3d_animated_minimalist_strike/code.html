<style>
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline-overlay {
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 255, 0.03) 50%, transparent);
            animation: scanline 12s linear infinite;
        }
        .grid-background {
            background-image: linear-gradient(#ffffff05 1px, transparent 1px), linear-gradient(90deg, #ffffff05 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Zero-G Tactical Motion Language */
        @keyframes monitor-flicker {
            0% { opacity: 0; transform: scaleY(0.005) scaleX(0); }
            5% { opacity: 0.8; transform: scaleY(0.01) scaleX(1); }
            10% { opacity: 0.3; }
            15% { opacity: 1; transform: scaleY(1) scaleX(1); }
            20% { opacity: 0.8; }
            25% { opacity: 1; }
            100% { opacity: 1; }
        }

        @keyframes jitter {
            0% { transform: translate(0,0); }
            10% { transform: translate(-1px, 1px); }
            20% { transform: translate(1px, -1px); }
            30% { transform: translate(-1px, -1px); }
            40% { transform: translate(1px, 1px); }
            50% { transform: translate(0,0); }
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-5deg); }
            21% { transform: skew(10deg); }
            22% { transform: skew(0deg); }
            100% { transform: skew(0deg); }
        }

        @keyframes drift-depth {
            0% { transform: translateZ(0); }
            100% { transform: translateZ(50px); }
        }

        .tactical-entrance {
            animation: monitor-flicker 0.4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .telemetry-jitter {
            animation: jitter 0.2s infinite alternate;
            animation-play-state: paused;
        }
        .telemetry-jitter:hover, .group:hover .telemetry-jitter {
            animation-play-state: running;
        }

        .staggered-item {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .staggered-ready .staggered-item {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-glitch:hover {
            animation: glitch-skew 0.3s infinite;
        }
        .btn-glitch:active {
            transform: skew(15deg) scale(0.98);
        }

        body {
            min-height: 100dvh;
            perspective: 1000px;
        }
    </style>

<script>
        // Particle System (Refined 'Embers' for Zero-G feel)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * 2; // Depth
                this.size = (Math.random() * 1.5 + 0.5) * this.z;
                this.speedY = (Math.random() * 2 + 1) * this.z; // Slower drifting embers
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.alpha = (Math.random() * 0.3 + 0.1) * this.z;
                this.color = Math.random() > 0.8 ? '#ffb4aa' : '#ffffff'; // Primary or White
            }
            update() {
                this.y -= this.speedY; // Floating up
                this.x += this.speedX;
                if (this.y < -20) {
                    this.y = canvas.height + 20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Boot and Entrance Logic
        window.addEventListener('DOMContentLoaded', () => {
            const boot = document.getElementById('boot-screen');
            const hud = document.getElementById('hud-container');
            
            setTimeout(() => {
                // Flicker Out Boot
                boot.classList.add('tactical-entrance');
                boot.style.animationDirection = 'reverse';
                boot.style.opacity = '0';
                
                setTimeout(() => {
                    boot.style.display = 'none';
                    // Show HUD
                    hud.classList.add('tactical-entrance');
                    hud.classList.remove('opacity-0');
                    document.body.classList.add('staggered-ready');
                }, 400);
            }, 1200);
        });

        function startGame() {
            const menu = document.getElementById('start-menu');
            const hud = document.getElementById('hud-container');
            
            // Outward flicker effect
            hud.style.animation = 'monitor-flicker 0.3s reverse forwards';
            
            setTimeout(() => {
                alert('ZERO-G STRIKE SEQUENCE INITIATED');
                location.reload();
            }, 500);
        }

        // Add random micro-glitches to text items labeled with telemetry-jitter
        setInterval(() => {
            const jitters = document.querySelectorAll('.telemetry-jitter');
            const target = jitters[Math.floor(Math.random() * jitters.length)];
            if (target) {
                target.style.filter = 'skewX(10deg) brightness(1.5)';
                setTimeout(() => {
                    target.style.filter = '';
                }, 50);
            }
        }, 2000);
    </script>
