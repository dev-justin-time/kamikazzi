<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://esm.sh 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://esm.sh blob: data: blob: https://www.gstatic.com; worker-src 'self' blob:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title data-i18n="title">KAMIKAZZI 3D</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg">
<link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">

<!-- Kamikaze theme typography: Stick No Bills for Latin signage, Noto Sans JP for the kanji sub-title. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Stick+No+Bills:wght@400;600;800&display=swap" crossorigin="anonymous">
<!-- Tactical HUD font -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Kamikaze theme fonts: Anton (display), Space Mono (mono labels), Geist (body), Epilogue (kanji decorative) -->
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Epilogue:wght@900&family=Geist:wght@400;600&display=swap" rel="stylesheet">
<!-- Material Symbols (icon font) -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles/main.css">
  <!-- UI module styles (extracted from JS inline styles) -->
  <link rel="stylesheet" href="./game/ui/styles/hud.css">
  <link rel="stylesheet" href="./game/ui/styles/modals.css">
  <link rel="stylesheet" href="./game/ui/styles/panels.css">
  <link rel="stylesheet" href="./game/ui/styles/settings.css">
  <link rel="stylesheet" href="./game/ui/styles/lobby.css">
  <link rel="stylesheet" href="./game/ui/styles/skin-lab.css">
  <link rel="stylesheet" href="./game/ui/styles/cloud-status.css">

  <!-- Pre-compiled Tailwind CSS (replaces CDN: 75KB vs 300KB) -->
  <link rel="stylesheet" href="./styles/tailwind.css">
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.158.0",
    "three/addons/": "https://esm.sh/three@0.158.0/examples/jsm/",
    "nipplejs": "https://esm.sh/nipplejs@0.10.1"
  }
}
</script>
</head>
<body>
<div id="game" role="application" aria-label="Kamikazzi 3D game world"></div>
<div id="hud" role="status" aria-live="polite" aria-atomic="true"><div id="score">Score: <span id="scoreVal">0</span><span class="speed">Level <span id="levelVal">1</span> · Speed <span id="speedVal">1.0x</span></span></div></div>
<div id="burger" title="Burger! Click me!" role="button" tabindex="0" aria-label="Burger easter egg"><span class="material-symbols-outlined" aria-hidden="true">lunch_dining</span></div>
<div id="userBadge" class="hidden" aria-live="polite"></div>

<!-- Panels loaded from gui-states/ by screen-loader.js -->
<div id="finalSectorScreen" data-gui-state="final-sector" class="hidden"></div>
<div id="modelUpgradeScreen" data-gui-state="model-upgrade" class="hidden"></div>

<!-- Tactical overlays -->
<div class="scanline-overlay" aria-hidden="true"></div>
<div class="grid-overlay" aria-hidden="true"></div>

<div id="bootScreen" data-gui-state="boot"></div>
<div id="pauseScreen" data-gui-state="pause" class="hidden"></div>
<div id="startScreen" data-gui-state="start" class="overlay"></div>
<div id="explodeScreen" data-gui-state="crash" class="hidden"></div>
<div id="missionSuccess" data-gui-state="mission-success" class="overlay hidden"></div>
<div id="gameOver" data-gui-state="mission-terminated" class="overlay hidden"></div>
<div id="leaderboardPanel" data-gui-state="leaderboard" class="hidden"></div>
<div id="replayPanel" data-gui-state="replays" class="hidden"></div>
<div id="replayDetailPanel" data-gui-state="replay-detail" class="hidden"></div>
<div id="deleteConfirmPanel" data-gui-state="delete-confirm" class="hidden"></div>
<div id="shortcutsPanel" data-gui-state="shortcuts" class="hidden"></div>
<div id="runHistoryPanel" data-gui-state="history" class="hidden"></div>
<div id="briefingsPanel" data-gui-state="briefings" class="hidden"></div>
<div id="skinLabPanel" data-gui-state="skin-lab" class="hidden"></div>
<div id="marketplacePanel" data-gui-state="marketplace" class="hidden"></div>
<div id="profilePanel" data-gui-state="profile" class="hidden"></div>
<div id="settingsPanel" data-gui-state="settings" class="hidden"></div>
<div id="communityPowerupPanel" data-gui-state="powerups" class="hidden"></div>
<div id="lobbyPanel" data-gui-state="lobby" class="hidden"></div>
<div id="legalPanel" data-gui-state="legal" class="hidden"></div>
<div id="levelFabricatorOverlay" data-gui-state="terrain-editor" class="hidden"></div>

<script type="module" src="./game/error-logger.js"></script>
<script type="module">
  import { init } from './game/locale.js';
  window.__localeInit = init();
</script>
<script type="module" src="./game/main.js"></script>
<!-- removed inline game script (moved to /game.js) -->

<script type="module" src="./game/puter-client.js"></script>
<!-- removed inline puter integration (moved to /puter-client.js) -->

<!-- Service Worker: unregister any existing SW to avoid stale cache issues -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    for (const reg of regs) {
      reg.unregister();
      console.log('[SW] Unregistered:', reg.scope);
    }
  });
}
</script>
</body>
</html>
