<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIKAZZI 3D — Skin Lab</title>
<link rel="stylesheet" href="styles.css">
<style>
  .page-content { background: rgba(0,11,26,0.92); justify-content: center; backdrop-filter: blur(8px); }
  .skin-section { border: 1px solid rgba(152,203,255,0.15); padding: 14px; border-radius: 4px; margin-bottom: 14px; text-align: left; }
  .skin-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: #00dddd; text-transform: uppercase; margin-bottom: 10px; }
  .preview-box { width: 64px; height: 64px; border-radius: 4px; border: 1px solid rgba(152,203,255,0.2); background: rgba(0,0,0,0.3); background-size: cover; background-position: center; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .preview-box.round { border-radius: 50%; }
  .button-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="nav-bar">
  <a href="start.html" class="nav-back">← Start</a>
  <span class="nav-title">🎨 Skin Lab</span>
  <a href="start.html" class="nav-close" title="Close">✕</a>
</div>

<div class="page-content">
  <div class="lb-panel" style="max-width:540px;max-height:85vh;">
    <div class="boot-bracket-tl"></div><div class="boot-bracket-tr"></div>
    <div class="boot-bracket-bl"></div><div class="boot-bracket-br"></div>
    <h3>🎨 Skin Lab</h3>

    <div class="lb-body" style="display:flex;flex-direction:column;gap:16px;">
      <!-- Plane Skin -->
      <div class="skin-section">
        <div class="skin-section-title">Plane Skin</div>
        <input class="gui-input" type="text" value="flaming dragon camo" placeholder="e.g. flaming dragon camo">
        <div style="font-size:9px;font-weight:700;letter-spacing:0.12em;color:rgba(152,203,255,0.55);text-transform:uppercase;margin:10px 0 6px;">Style Preset</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">
          <span class="skin-style-chip active"><span class="chip-emoji">⚔️</span> Kamikaze</span>
          <span class="skin-style-chip"><span class="chip-emoji">🌊</span> Waves</span>
          <span class="skin-style-chip"><span class="chip-emoji">🔥</span> Flames</span>
          <span class="skin-style-chip"><span class="chip-emoji">🌙</span> Night</span>
        </div>
        <div class="button-row">
          <a href="#" class="lb-close" style="text-decoration:none;align-self:flex-start;margin:0;" onclick="return false;">Generate Skin</a>
          <div class="preview-box" style="background:linear-gradient(135deg,#ff4444,#ff8800,#ffcc00);">🎨</div>
          <span style="font-size:11px;color:rgba(152,203,255,0.6);">Applied!</span>
        </div>
      </div>

      <!-- Pilot Portrait -->
      <div class="skin-section">
        <div class="skin-section-title">Pilot Portrait</div>
        <input class="gui-input" type="text" value="cyberpunk pilot with aviator goggles" placeholder="e.g. cyberpunk pilot">
        <div style="font-size:9px;font-weight:700;letter-spacing:0.12em;color:rgba(152,203,255,0.55);text-transform:uppercase;margin:10px 0 6px;">Style Preset</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">
          <span class="skin-style-chip active"><span class="chip-emoji">⚔️</span> Kamikaze</span>
          <span class="skin-style-chip"><span class="chip-emoji">🌊</span> Waves</span>
          <span class="skin-style-chip"><span class="chip-emoji">🔥</span> Flames</span>
        </div>
        <div class="button-row">
          <a href="#" class="lb-close" style="text-decoration:none;align-self:flex-start;margin:0;" onclick="return false;">Generate Portrait</a>
          <div class="preview-box round" style="background:linear-gradient(135deg,#4488ff,#8844ff);">🧑‍✈️</div>
          <span style="font-size:11px;color:rgba(152,203,255,0.6);">Saved!</span>
        </div>
      </div>

      <!-- Building Palette -->
      <div class="skin-section">
        <div class="skin-section-title">Building Palette</div>
        <input class="gui-input" type="text" value="mediterranean seaside town" placeholder="e.g. mediterranean seaside">
        <div class="button-row">
          <a href="#" class="lb-close" style="text-decoration:none;align-self:flex-start;margin:0;" onclick="return false;">Generate Palette</a>
          <div style="display:flex;gap:3px;height:40px;flex:1;min-width:120px;border-radius:3px;overflow:hidden;border:1px solid rgba(152,203,255,0.15);">
            <div style="flex:1;background:#e8d5b7;"></div>
            <div style="flex:1;background:#9ab8d9;"></div>
            <div style="flex:1;background:#d4756b;"></div>
            <div style="flex:1;background:#5a8a6a;"></div>
            <div style="flex:1;background:#f0e6d3;"></div>
          </div>
        </div>
        <div style="margin-top:8px;">
          <a href="#" class="lb-close" style="text-decoration:none;display:inline-block;margin:0;border-color:rgba(0,221,221,0.4);color:#00dddd;" onclick="return false;">Apply as Building Skin</a>
        </div>
      </div>
    </div>

    <a href="start.html" class="lb-close" style="text-decoration:none;display:inline-block;">Close</a>
  </div>
</div>

<div class="state-badge">STATE: skin-lab</div>
</body>
</html>
