<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMIKAZZI 3D — Crash</title>
<link rel="stylesheet" href="styles.css">
<style>
  .page-content { background: #000; justify-content: center; padding: 0; }
  .game-frame { max-width: 800px; padding-bottom: 56.25%; border: none; background: #000; }
  .crash-container { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; }
  .crash-splash-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; pointer-events: none; background: radial-gradient(ellipse at center, #331100, #000); }
  .explode-gif { max-height: 92vh; max-width: 86vw; object-fit: contain; filter: drop-shadow(0 0 22px rgba(255,110,50,0.35)); position: relative; z-index: 1; font-size: 80px; text-align: center; animation: explodePulse 0.4s ease-out 3; }
  @keyframes explodePulse { 0%{transform:scale(0.8);opacity:0.5} 30%{transform:scale(1.1);opacity:1} 100%{transform:scale(1);opacity:1} }
  .crash-overlay-controls { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; z-index: 5; }
  .crash-overlay-controls a { padding: 8px 18px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: 1px solid rgba(255,100,100,0.3); background: rgba(0,0,0,0.7); color: rgba(255,180,171,0.7); text-decoration: none; border-radius: 3px; transition: all 0.15s ease; }
  .crash-overlay-controls a:hover { background: rgba(255,100,100,0.15); border-color: #ff6464; color: #fff; }
</style>
</head>
<body>
<div class="nav-bar">
  <a href="hud.html" class="nav-back">← HUD</a>
  <span class="nav-title">💥 Crash / Explosion</span>
  <a href="mission-terminated.html" class="nav-close" title="Show game over">→</a>
</div>

<div class="page-content">
  <div class="game-frame">
    <div class="crash-container">
      <div class="crash-splash-bg"></div>
      <div class="explode-gif">💥💥💥</div>

      <div class="crash-overlay-controls">
        <a href="mission-terminated.html">❌ Mission Terminated</a>
        <a href="mission-success.html">✅ Skip to Success</a>
        <a href="start.html">🏠 Menu</a>
      </div>
    </div>
  </div>
</div>

<div class="state-badge">STATE: crash</div>
</body>
</html>
