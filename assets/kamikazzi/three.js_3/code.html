<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_61 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_61" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_61');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
camera.position.set(0, 40, 60);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xe0115f, 1);
directionalLight.position.set(10, 20, 10);
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0x00f9f9, 2, 100);
pointLight.position.set(-20, 10, -20);
scene.add(pointLight);

// Terrain Generation
const size = 100;
const segments = 128;
const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
geometry.rotateX(-Math.PI / 2);

const vertices = geometry.attributes.position.array;

// Simple Noise function for initial state
function noise(x, y) {
    return Math.sin(x * 0.1) * Math.cos(y * 0.1) * 5 + 
           Math.sin(x * 0.05 + y * 0.02) * 10;
}

for (let i = 0; i < vertices.length; i += 3) {
    const x = vertices[i];
    const z = vertices[i + 2];
    vertices[i + 1] = noise(x, z);
}

geometry.computeVertexNormals();

const material = new THREE.MeshPhongMaterial({
    color: 0x1c1b1b,
    wireframe: true,
    transparent: true,
    opacity: 0.4,
    emissive: 0x00f9f9,
    emissiveIntensity: 0.1
});

const terrain = new THREE.Mesh(geometry, material);
scene.add(terrain);

// Add a glowing grid floor
const gridHelper = new THREE.GridHelper(200, 20, 0xe0115f, 0x1c1b1b);
gridHelper.position.y = -15;
scene.add(gridHelper);

// Interaction logic
let targetRotationX = 0;
let targetRotationY = 0;

window.addEventListener('mousemove', (e) => {
    const mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    const mouseY = (e.clientY / window.innerHeight) * 2 - 1;
    targetRotationY = mouseX * 0.2;
    targetRotationX = mouseY * 0.1;
});

function animate() {
    requestAnimationFrame(animate);
    
    const time = Date.now() * 0.001;
    
    // Gentle floating motion
    terrain.rotation.y += (targetRotationY - terrain.rotation.y) * 0.05;
    terrain.rotation.x += (targetRotationX - terrain.rotation.x) * 0.05;
    
    // Wave animation for the terrain
    const pos = geometry.attributes.position.array;
    for (let i = 0; i < pos.length; i += 3) {
        const x = pos[i];
        const z = pos[i + 2];
        pos[i + 1] = noise(x + time * 2, z + time * 2);
    }
    geometry.attributes.position.needsUpdate = true;
    
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_61 -->
</body>
</html>
