<style>
        body {
            background-color: #001525;
            color: #cde5fe;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
        }

        /* 3D Blueprint Background - Virtual Arctic Lab */
        .scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            perspective: 1000px;
            overflow: hidden;
        }

        .arctic-landscape {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                linear-gradient(rgba(0, 163, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 163, 255, 0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: rotateX(60deg);
            background-color: #000f1d;
        }

        /* Jagged Icy Peaks Representation */
        .ice-peaks {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(152, 203, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(0, 221, 221, 0.1) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(152, 203, 255, 0.03) 101px, rgba(152, 203, 255, 0.03) 102px);
        }

        /* Subterranean Research Pods */
        .research-pods {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .pod {
            position: absolute;
            border: 1px solid rgba(152, 203, 255, 0.4);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 163, 255, 0.1) 0%, transparent 70%);
            animation: pulse-pod 4s infinite ease-in-out;
        }

        @keyframes pulse-pod {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* Glowing Frost Patterns */
        .frost-pattern {
            position: absolute;
            inset: 0;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0L52 48L100 50L52 52L50 100L48 52L0 50L48 48Z' fill='none' stroke='rgba(152, 203, 255, 0.1)' stroke-width='0.5'/%3E%3C/svg%3E");
            background-size: 150px 150px;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Thermal Scan Overlays */
        .thermal-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(0, 255, 255, 0.05) 100%);
            mix-blend-mode: color-dodge;
            animation: thermal-flicker 10s infinite;
        }

        @keyframes thermal-flicker {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
            70% { opacity: 0.4; }
        }

        /* Tactical HUD Grid Overlay */
        .hud-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            background-image: 
                linear-gradient(rgba(152, 203, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(152, 203, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .scanline {
            width: 100%;
            height: 100%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(152, 203, 255, 0.02), rgba(0, 221, 221, 0.01), rgba(0, 163, 255, 0.02));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        .scanning-bar {
            position: fixed;
            top: -100px;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, rgba(0, 221, 221, 0.15) 0%, transparent 100%);
            animation: scan 6s linear infinite;
            pointer-events: none;
            z-index: 15;
        }

        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100vh; }
        }

        .glitch-text {
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-1px, 1px); }
            4% { transform: translate(1px, -1px); }
            6% { transform: translate(0); }
        }

        /* Responsive UI Layer */
        .ui-layer {
            position: relative;
            z-index: 20;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }
    </style>
