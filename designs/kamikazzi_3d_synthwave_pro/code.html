<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>KAMIKAZZI 3D - NEON EDITION</title>
<!-- Hyper-Modern Typography -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,700;0,900;1,800&amp;family=Noto+Sans+JP:wght@400;700&amp;family=Syncopate:wght@400;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #05050a;
    font-family: 'Exo 2', sans-serif;
    color: #fff;
  }
  #game { position: fixed; inset: 0; }
  
  /* Glassmorphism base */
  .glass {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
  }

  /* Title Styles - Wide and modern */
  h1 {
    font-family: 'Syncopate', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .subtitle .kanji {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 700;
    letter-spacing: 12px;
    background: linear-gradient(to bottom, #ff007f, #7a00ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 8px rgba(255, 0, 127, 0.4));
  }
  
  .subtitle .romaji {
    font-family: 'Syncopate', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4em;
    opacity: 0.6;
    margin-top: 8px;
  }

  #hud {
    position: fixed; top: 24px; left: 0; right: 0;
    display: flex; justify-content: center; pointer-events: none;
    z-index: 10;
  }
  
  #score {
    padding: 12px 32px;
    border-radius: 100px;
    font-weight: 900;
    font-style: italic;
    letter-spacing: 2px;
    font-size: 18px;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
  #score .speed { 
    font-size: 11px; 
    opacity: 0.7; 
    font-weight: 300; 
    font-style: normal;
    margin-left: 16px; 
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 20;
    background: radial-gradient(circle at center, rgba(15, 5, 35, 0.4) 0%, rgba(5, 5, 10, 0.9) 100%);
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  /* Main Panel for Glassmorphism UI */
  .panel {
    padding: 60px 40px;
    border-radius: 32px;
    max-width: 650px;
    width: 90%;
    position: relative;
    overflow: hidden;
  }
  
  /* Light Leak Effect */
  .panel::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 30%, rgba(255, 0, 127, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(122, 0, 255, 0.1) 0%, transparent 40%);
    pointer-events: none;
  }

  .overlay h1 {
    font-size: clamp(32px, 8vw, 64px); 
    margin-bottom: 24px;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
  }
  
  .overlay p { 
    font-size: 16px; 
    margin-top: 32px;
    opacity: 0.7; 
    max-width: 450px; 
    line-height: 1.6;
    font-weight: 300;
  }

  /* Vibrant Sunset Pill Button */
  .btn {
    margin-top: 40px; 
    padding: 16px 52px; 
    font-size: 16px; 
    font-weight: 900;
    font-family: 'Syncopate', sans-serif;
    letter-spacing: 3px; 
    text-transform: uppercase;
    border: none; 
    border-radius: 999px; 
    cursor: pointer; 
    color: #fff;
    background: linear-gradient(135deg, #ff007f 0%, #7a00ff 100%);
    box-shadow: 0 10px 40px rgba(255, 0, 127, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.2);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { 
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 15px 50px rgba(255, 0, 127, 0.6), inset 0 0 30px rgba(255, 255, 255, 0.4);
  }
  .btn:active { transform: scale(0.96); }
  
  .big-score { 
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(40px, 10vw, 72px); 
    font-weight: 700; 
    margin: 20px 0; 
    background: linear-gradient(135deg, #fff 0%, #ff007f 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -2px;
  }

  .hint { 
    margin-top: 32px; 
    font-size: 11px; 
    opacity: 0.5; 
    line-height: 1.8; 
    text-transform: uppercase; 
    letter-spacing: 2px;
  }
  
  #burger {
    position: fixed; bottom: 24px; right: 24px; z-index: 15;
    font-size: 32px;
    filter: drop-shadow(0 0 10px rgba(255, 165, 0, 0.5));
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  #burger:hover { opacity: 1; }

  .hidden { display: none !important; opacity: 0; pointer-events: none; }

  /* 3D Scene Container */
  threejs-scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }
</style>
</head>
<body>
<div id="game">

</div>
<div id="hud">
<div class="glass" id="score">SCORE: <span id="scoreVal">0</span><span class="speed">LVL <span id="levelVal">1</span> // SPD <span id="speedVal">1.0x</span></span></div>
</div>
<div id="burger" title="Easter Egg">🍔</div>
<!-- Start Screen -->
<div class="overlay" id="startScreen">
<div class="panel glass flex flex-col items-center">
<h1>KAMIKAZZI</h1>
<div aria-label="shin kaze" class="subtitle flex flex-col items-center">
<span class="kanji">神風</span>
<span class="romaji">SYNTHWAVE PROTOCOL</span>
</div>
<p>Infiltrate the neon grid. Navigate the high-speed data stream through the monolithic towers of Neo-Tokyo. Speed is your only defense.</p>
<button class="btn" id="startBtn">Enter Grid</button>
<div class="hint">
WASD / ARROWS TO STEER<br/>
MOTION TILT OR DRAG FOR MOBILE
</div>
</div>
</div>
<!-- Game Over Screen -->
<div class="overlay hidden" id="gameOver">
<div class="panel glass flex flex-col items-center">
<h1>SIGNAL LOST</h1>
<div class="big-score"><span id="finalScore">0</span></div>
<p class="uppercase tracking-widest text-xs opacity-50 mb-8" id="bestLine">MAX UPLOAD: <span class="font-bold" id="bestScore">0</span></p>
<button class="btn" id="retryBtn">Reconnect</button>
</div>
</div>
<script>
  // UI logic
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const startScreen = document.getElementById('startScreen');
  const gameOver = document.getElementById('gameOver');
  const scoreVal = document.getElementById('scoreVal');
  const finalScore = document.getElementById('finalScore');

  let gameActive = false;
  let score = 0;

  startBtn.addEventListener('click', () => {
    startScreen.classList.add('hidden');
    gameActive = true;
    score = 0;
    updateScore();
  });

  retryBtn.addEventListener('click', () => {
    gameOver.classList.add('hidden');
    gameActive = true;
    score = 0;
    updateScore();
  });

  function updateScore() {
    if (!gameActive) return;
    score += 1;
    scoreVal.innerText = score;
    requestAnimationFrame(updateScore);
  }
</script>
</body></html>
