<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_1 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_1" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_1');
  const devicePixelRatio = window.devicePixelRatio || 1;
  // Kamikazzi 3D - High-speed flight through a neon valley
// Using global THREE namespace as per instructions

const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.002);

const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.set(0, 5, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404040, 2);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff0080, 2, 100);
pointLight.position.set(10, 10, 10);
scene.add(pointLight);

// Valley / Terrain
const terrainGroup = new THREE.Group();
scene.add(terrainGroup);

const floorGeo = new THREE.PlaneGeometry(1000, 1000, 50, 50);
const floorMat = new THREE.MeshPhongMaterial({ 
    color: 0x111111, 
    wireframe: true,
    emissive: 0x00ffff,
    emissiveIntensity: 0.1
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// Procedural "Buildings" or Pillars
function createBuilding(z) {
    const h = 20 + Math.random() * 50;
    const w = 5 + Math.random() * 10;
    const geo = new THREE.BoxGeometry(w, h, w);
    const mat = new THREE.MeshPhongMaterial({ 
        color: 0x222222,
        emissive: Math.random() > 0.5 ? 0x00ffff : 0xff00ff,
        emissiveIntensity: 0.2
    });
    const building = new THREE.Mesh(geo, mat);
    
    // Position on sides of a "valley"
    const side = Math.random() > 0.5 ? 1 : -1;
    building.position.set(side * (25 + Math.random() * 40), h/2, z);
    return building;
}

for(let i = 0; i < 40; i++) {
    terrainGroup.add(createBuilding(-i * 25));
}

// Player "Warbird" - Simplified for visibility
const shipGroup = new THREE.Group();
scene.add(shipGroup);

// Fuselage
const bodyGeo = new THREE.CylinderGeometry(0.5, 0.8, 4, 8);
bodyGeo.rotateX(Math.PI / 2);
const bodyMat = new THREE.MeshPhongMaterial({ color: 0xdddddd });
const body = new THREE.Mesh(bodyGeo, bodyMat);
shipGroup.add(body);

// Wings
const wingGeo = new THREE.BoxGeometry(6, 0.1, 1.5);
const wingMat = new THREE.MeshPhongMaterial({ color: 0xcc0000 });
const wings = new THREE.Mesh(wingGeo, wingMat);
shipGroup.add(wings);

// Tail
const tailGeo = new THREE.BoxGeometry(0.1, 1.5, 1);
tailGeo.translate(0, 0.7, -1.5);
const tail = new THREE.Mesh(tailGeo, wingMat);
shipGroup.add(tail);

shipGroup.position.y = 5;

// Animation State
let clock = new THREE.Clock();
let mouseX = 0;
let mouseY = 0;

window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

function animate() {
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    // Move terrain backwards to simulate forward flight
    terrainGroup.position.z += 50 * delta;
    if (terrainGroup.position.z > 25) {
        terrainGroup.position.z = 0;
    }

    // Ship response to mouse (simulated steering)
    shipGroup.position.x += (mouseX * 20 - shipGroup.position.x) * 0.05;
    shipGroup.position.y += (mouseY * 10 + 5 - shipGroup.position.y) * 0.05;
    
    // Banking
    shipGroup.rotation.z = -mouseX * 0.5;
    shipGroup.rotation.x = mouseY * 0.2;
    shipGroup.rotation.y = -mouseX * 0.2;

    // Camera follow slightly
    camera.position.x += (shipGroup.position.x - camera.position.x) * 0.02;
    camera.lookAt(shipGroup.position.x, shipGroup.position.y, shipGroup.position.z - 10);

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_1 -->
</body>
</html>
