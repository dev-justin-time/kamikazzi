<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'JetBrains Mono', monospace;
        }
        #ui {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #00f2ff;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        .controls-hint {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            color: rgba(0, 242, 255, 0.6);
            font-size: 0.8rem;
            text-align: right;
        }
    </style>
</head>
<body>
<div id="ui">
<h1 class="text-2xl font-bold mb-1">BLUEPRINT CANYON</h1>
<p class="text-xs opacity-70">FLIGHT SYSTEM V2.4 // PROTOCOL ACTIVE</p>
<div class="mt-8">
<div class="flex items-center gap-2 mb-2">
<div class="w-24 h-1 bg-blue-900 overflow-hidden">
<div class="h-full bg-cyan-400 w-1/2" id="throttle-bar"></div>
</div>
<span class="text-[10px]">THROTTLE</span>
</div>
<div class="flex items-center gap-2">
<div class="w-24 h-1 bg-blue-900 overflow-hidden">
<div class="h-full bg-cyan-400 w-3/4" id="alt-bar"></div>
</div>
<span class="text-[10px]">ALTITUDE</span>
</div>
</div>
</div>
<div class="controls-hint">
    [W/S] PITCH<br/>
    [A/D] ROLL<br/>
    [SHIFT/SPACE] THROTTLE
</div>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>
<script type="module">
    import * as THREE from 'three';

    // Scene setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000810, 0.002);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Colors
    const BLUEPRINT_BLUE = 0x00f2ff;
    const DARK_BLUE = 0x000810;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x001122, 1);
    scene.add(ambientLight);
    
    const pointLight = new THREE.PointLight(BLUEPRINT_BLUE, 2, 100);
    scene.add(pointLight);

    // Aircraft (Warbird)
    const shipGroup = new THREE.Group();
    const shipMaterial = new THREE.MeshPhongMaterial({ 
        color: 0x000000, 
        emissive: BLUEPRINT_BLUE, 
        emissiveIntensity: 0.5,
        wireframe: true 
    });

    // Simple Warbird Geometry
    const fuselage = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 2), shipMaterial);
    const wings = new THREE.Mesh(new THREE.BoxGeometry(3, 0.05, 0.8), shipMaterial);
    wings.position.z = 0.2;
    const tailV = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.4), shipMaterial);
    tailV.position.set(0, 0.3, -0.8);
    const tailH = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.05, 0.4), shipMaterial);
    tailH.position.set(0, 0.1, -0.8);

    shipGroup.add(fuselage, wings, tailV, tailH);
    scene.add(shipGroup);
    shipGroup.position.y = 15;

    // Canyon Generation Logic
    const CHUNK_SIZE = 400;
    const canyonChunks = [];
    
    function createCanyonChunk(zOffset) {
        const chunk = new THREE.Group();
        
        // Ground Mesh (Jagged Crystalline Floor)
        const groundGeo = new THREE.PlaneGeometry(200, CHUNK_SIZE, 32, 64);
        const pos = groundGeo.attributes.position;
        
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const y = pos.getY(i);
            
            // Canyon Walls: high peaks on sides, jagged center
            let h = 0;
            const distFromCenter = Math.abs(x);
            
            if (distFromCenter > 30) {
                // Canyon walls
                h = Math.pow((distFromCenter - 30) * 0.4, 1.8) + (Math.random() * 15);
            } else {
                // Jagged floor with some technical noise
                h = (Math.random() * 2) + Math.sin(y * 0.1) * 0.5;
            }
            pos.setZ(i, h);
        }
        groundGeo.computeVertexNormals();

        const groundMat = new THREE.MeshPhongMaterial({
            color: 0x000000,
            emissive: 0x001122,
            flatShading: true,
            side: THREE.DoubleSide
        });
        
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        chunk.add(groundMesh);

        // Wireframe Overlay (The "Blueprint" look)
        const wireframe = new THREE.LineSegments(
            new THREE.WireframeGeometry(groundGeo),
            new THREE.LineBasicMaterial({ color: 0x004466, transparent: true, opacity: 0.3 })
        );
        wireframe.rotation.x = -Math.PI / 2;
        chunk.add(wireframe);

        // Bioluminescent Grid Trails
        const trailCount = 8;
        for (let i = 0; i < trailCount; i++) {
            const trailWidth = 0.5 + Math.random() * 1;
            const trailGeo = new THREE.PlaneGeometry(trailWidth, CHUNK_SIZE);
            const trailMat = new THREE.MeshBasicMaterial({
                color: BLUEPRINT_BLUE,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide
            });
            const trail = new THREE.Mesh(trailGeo, trailMat);
            trail.rotation.x = -Math.PI / 2;
            trail.position.y = 0.1;
            trail.position.x = (Math.random() - 0.5) * 40; // Stay near center path
            chunk.add(trail);
        }

        chunk.position.z = zOffset;
        scene.add(chunk);
        return chunk;
    }

    // Initial Chunks
    for (let i = 0; i < 3; i++) {
        canyonChunks.push(createCanyonChunk(-i * CHUNK_SIZE));
    }

    // Flight Controls
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    let velocity = 0.5;
    let rotationVelocity = { x: 0, y: 0, z: 0 };
    const maxVelocity = 1.8;
    const accel = 0.01;

    function updateFlight() {
        // Thrust
        if (keys['ShiftLeft']) velocity = Math.min(velocity + accel, maxVelocity);
        if (keys['Space']) velocity = Math.max(velocity - accel, 0.1);

        // Rotation
        const rotSpeed = 0.04;
        if (keys['KeyW']) rotationVelocity.x -= 0.002;
        if (keys['KeyS']) rotationVelocity.x += 0.002;
        if (keys['KeyA']) rotationVelocity.z += 0.002;
        if (keys['KeyD']) rotationVelocity.z -= 0.002;

        // Dampen rotation
        rotationVelocity.x *= 0.95;
        rotationVelocity.z *= 0.95;

        shipGroup.rotateX(rotationVelocity.x);
        shipGroup.rotateZ(rotationVelocity.z);
        
        // Auto-roll correction
        shipGroup.rotation.z *= 0.98;

        // Move forward relative to ship orientation
        const direction = new THREE.Vector3(0, 0, -1);
        direction.applyQuaternion(shipGroup.quaternion);
        shipGroup.position.addScaledVector(direction, velocity);

        // Update UI
        document.getElementById('throttle-bar').style.width = `${(velocity / maxVelocity) * 100}%`;
        document.getElementById('alt-bar').style.width = `${Math.min((shipGroup.position.y / 60) * 100, 100)}%`;

        // Camera follow
        const relativeCameraOffset = new THREE.Vector3(0, 1.5, 6);
        const cameraOffset = relativeCameraOffset.applyMatrix4(shipGroup.matrixWorld);
        camera.position.lerp(cameraOffset, 0.1);
        camera.lookAt(shipGroup.position.clone().add(direction.multiplyScalar(10)));

        // Light follow
        pointLight.position.copy(shipGroup.position);
        pointLight.position.y += 2;

        // Chunk Management
        canyonChunks.forEach((chunk, index) => {
            if (shipGroup.position.z < chunk.position.z - CHUNK_SIZE) {
                chunk.position.z -= CHUNK_SIZE * 3;
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        updateFlight();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body></html>
