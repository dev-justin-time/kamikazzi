<style>
        body {
            background-color: #001525;
            background-image: 
                linear-gradient(rgba(0, 163, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 163, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
            color: #cde5fe;
            overflow-x: hidden;
        }

        .scanline {
            width: 100%;
            height: 100%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            position: fixed;
            top: 0;
            left: 0;
        }

        .scanning-bar {
            position: fixed;
            top: -100px;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, rgba(0, 255, 255, 0.1) 0%, transparent 100%);
            animation: scan 6s linear infinite;
            pointer-events: none;
            z-index: 15;
        }

        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100vh; }
        }

        .glitch-text {
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 2px); }
            4% { transform: translate(2px, -2px); }
            6% { transform: translate(0); }
        }

        .hud-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #98cbff;
        }
        .corner-tl { top: 0; left: 0; border-top-width: 3px; border-left-width: 3px; }
        .corner-tr { top: 0; right: 0; border-top-width: 3px; border-right-width: 3px; }
        .corner-bl { bottom: 0; left: 0; border-bottom-width: 3px;</style></head><body></body></html>
