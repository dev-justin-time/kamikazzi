<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>KAMIKAZZI 3D - ARCADE EDITION</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&amp;family=Press+Start+2P&amp;family=VT323&amp;display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #05000a;
    font-family: 'VT323', monospace;
    color: #00ff41;
  }
  
  /* CRT Effects */
  .crt-overlay {
    position: fixed; inset: 0; z-index: 99;
    pointer-events: none;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 3px, 3px 100%;
    animation: flicker 0.15s infinite;
  }

  @keyframes flicker {
    0% { opacity: 0.97; }
    50% { opacity: 1; }
    100% { opacity: 0.98; }
  }

  /* Arcade Cabinet Frame */
  #cabinet-frame {
    position: fixed; inset: 12px;
    border: 4px solid #330066;
    border-radius: 20px;
    box-shadow: inset 0 0 40px #9d00ff, 0 0 20px #9d00ff;
    z-index: 50;
    pointer-events: none;
  }

  #game { position: fixed; inset: 0; z-index: 1; }
  
  h1, #score, .btn {
    font-family: 'Press Start 2P', cursive;
  }

  .subtitle {
    text-align: center;
    margin-bottom: 24px;
    padding: 0 24px;
  }
  .subtitle .kanji {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 700;
    letter-spacing: 12px;
    color: #ffff00;
    display: block;
    text-shadow: 3px 3px 0px #ff00ff;
  }
  .subtitle .romaji {
    font-size: 18px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #00ff41;
    display: block;
    margin-top: 10px;
  }

  #hud {
    position: fixed; top: 32px; left: 0; right: 0;
    display: flex; justify-content: center; pointer-events: none;
    z-index: 10;
  }
  #score {
    background: rgba(0,0,0,0.8); 
    border: 3px solid #00ff41;
    color: #ffff00; padding: 12px 28px;
    font-size: 16px;
    box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
  }
  #score .speed { font-size: 10px; color: #00ff41; margin-left: 12px; display: block; margin-top: 8px; text-align: center; }
  
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 20;
    background: rgba(10, 0, 20, 0.85);
    color: #fff; text-align: center; padding: 32px;
  }
  
  .overlay h1 {
    font-size: clamp(28px, 6vw, 64px); margin-bottom: 12px;
    color: #ffff00;
    text-shadow: 4px 4px 0px #ff00ff, -2px -2px 0px #00ffff;
    letter-spacing: -2px;
  }
  
  .overlay p { 
    font-family: 'VT323', monospace;
    font-size: 24px; margin-bottom: 20px; color: #00ff41; max-width: 650px; line-height: 1.2; 
  }
  
  .big-score { font-family: 'Press Start 2P'; font-size: 24px; margin: 20px 0; color: #ffff00; }
  
  /* Backlit Arcade Button */
  .btn {
    margin-top: 30px; padding: 20px 40px; font-size: 16px;
    cursor: pointer; color: #fff;
    background: #ff0055;
    border: none;
    border-radius: 50px;
    box-shadow: 0 8px 0 #990033, 0 0 30px rgba(255, 0, 85, 0.6);
    transition: all 0.1s ease;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    -webkit-tap-highlight-color: transparent;
    border: 4px solid rgba(255, 255, 255, 0.3);
  }
  .btn:hover { background: #ff2b75; transform: translateY(2px); box-shadow: 0 6px 0 #990033, 0 0 40px rgba(255, 0, 85, 0.8); }
  .btn:active { transform: translateY(8px); box-shadow: 0 0 0 #990033; }
  
  .hint { margin-top: 24px; font-size: 20px; color: #ff00ff; font-weight: bold; }
  .hidden { display: none !important; }

  #burger {
    position: fixed; top: 32px; right: 40px; z-index: 60;
    font-size: 40px; filter: drop-shadow(0 0 10px #ffff00);
    animation: burgerBob 2s steps(4) infinite;
  }
  @keyframes burgerBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  threejs-scene {
    position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;
    filter: contrast(1.2) saturate(1.4) brightness(0.8);
  }
</style>
</head>
<body>
<div class="crt-overlay"></div>
<div id="cabinet-frame"></div>
<div id="game">

</div>
<div id="hud">
<div id="score">
  SCORE: <span id="scoreVal">000000</span>
<span class="speed">LVL <span id="levelVal">01</span> // SPEED <span id="speedVal">1.0</span>X</span>
</div>
</div>
<div id="burger" title="INSERT BURGER">🍔</div>
<div class="overlay" id="startScreen">
<h1>KAMIKAZZI 3D</h1>
<div aria-label="shin kaze" class="subtitle">
<span class="kanji">神風</span>
<span class="romaji">SHIN KAZE</span>
</div>
<p>STEER THE RATTLING WARBIRD THROUGH THE NEON CANYONS. DON'T CRASH INTO THE GRID. THE CITY DEMANDS A SACRIFICE.</p>
<div style="display:flex;gap:10px;align-items:center;flex-direction:column;">
<button class="btn" id="startBtn">START FLYING</button>
<div class="hint"> [ ARROWS/WASD ] [ TILT/DRAG ] </div>
</div>
</div>
<div class="overlay hidden" id="gameOver">
<h1>GAME OVER</h1>
<div class="big-score">FINAL SCORE: <span id="finalScore">0</span></div>
<p id="bestLine">HI-SCORE: <span id="bestScore">0</span></p>
<button class="btn" id="retryBtn">CONTINUE?</button>
</div>
<script>
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const startScreen = document.getElementById('startScreen');
  const gameOver = document.getElementById('gameOver');
  const scoreVal = document.getElementById('scoreVal');
  const finalScore = document.getElementById('finalScore');

  let gameActive = false;
  let score = 0;

  function formatScore(num) {
    return num.toString().padStart(6, '0');
  }

  startBtn.addEventListener('click', () => {
    startScreen.classList.add('hidden');
    gameActive = true;
    score = 0;
    updateScore();
  });

  retryBtn.addEventListener('click', () => {
    gameOver.classList.add('hidden');
    gameActive = true;
    score = 0;
    updateScore();
  });

  function updateScore() {
    if (!gameActive) return;
    score += 1;
    scoreVal.innerText = formatScore(score);
    requestAnimationFrame(updateScore);
  }
</script>
</body></html>
