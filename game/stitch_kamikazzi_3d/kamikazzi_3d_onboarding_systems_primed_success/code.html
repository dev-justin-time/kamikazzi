        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline-overlay {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 251, 251, 0.05) 50%);
            background-size: 100% 4px;
            animation: scanline 10s linear infinite;
        }
        .clipped-corner {
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        .glitch-flicker {
            animation: flicker 0.15s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        .hud-bracket-tl { border-top: 2px solid; border-left: 2px solid; width: 20px; height: 20px; }
        .hud-bracket-tr { border-top: 2px solid; border-right: 2px solid; width: 20px; height: 20px; }
        .hud-bracket-bl { border-bottom: 2px solid; border-left: 2px solid; width: 20px; height: 20px; }
        .hud-bracket-br { border-bottom: 2px solid; border-right: 2px solid; width: 20px; height: 20px; }

        body {
            background-color: #061423;
            overflow: hidden;
            cursor: crosshair;
        }
    </style>

<!-- ATMOSPHERIC SCRIPT -->
<script>
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const background = document.querySelector('[data-alt]');
            if (background) {
                background.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Simulating some diagnostic logs in console for flavor
        console.log("%c[SYSTEM] Initializing Kamikazzi_3D UI...", "color: #00fbfb; font-weight: bold;");
        console.log("%c[STATUS] Neural Link: STABLE", "color: #00fbfb;");
        console.log("%c[STATUS] Fuel Cells: OPTIMAL", "color: #00fbfb;");
        console.log("%c[STATUS] Weapons: STANDBY", "color: #ffb4aa;");
    </script>
