<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Import Model</title>
  <style>
    body { margin:0; font-family:sans-serif; background:#222; color:#eee; display:flex; align-items:center; justify-content:center; height:100vh; }
    .panel { width:460px; background:#333; padding:16px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,0.5); }
    h2{margin:0 0 10px 0;font-size:18px}
    label{display:block;margin:8px 0 4px 0;color:#ccc}
    input[type="text"], input[type="file"]{width:100%;padding:8px;border-radius:4px;border:1px solid #444;background:#222;color:#eee}
    button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px;background:#007bff;color:white;font-size:15px}
    .muted{font-size:12px;color:#aaa;margin-top:8px}
    .row{display:flex;gap:8px}
    .half{flex:1}
  </style>
</head>
<body>
  <div class="panel">
    <h2>Import Model</h2>
    <label for="file">Select model files (gltf/glb, obj, stl, or .bin + textures together)</label>
    <input id="file" type="file" accept=".gltf,.glb,.obj,.stl,.bin,.png,.jpg,.jpeg,.webp,.hdr,.ktx2" multiple />
    <button id="sendFileBtn">Send File(s) to Editor</button>

    <label for="url">Or enter a URL</label>
    <div class="row">
      <input id="url" type="text" placeholder="https://example.com/model.glb" />
      <button id="sendUrlBtn" class="half">Load</button>
    </div>

    <div class="muted">This window will send the selected file (as an object URL) or URL back to the main editor window via postMessage.</div>
    <div style="margin-top:8px;">
      <button id="closeBtn" style="background:#6c757d">Close</button>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file');
    const sendFileBtn = document.getElementById('sendFileBtn');
    const urlInput = document.getElementById('url');
    const sendUrlBtn = document.getElementById('sendUrlBtn');
    const closeBtn = document.getElementById('closeBtn');

    sendFileBtn.addEventListener('click', () => {
      const files = Array.from(fileInput.files || []);
      if (files.length === 0) {
        alert('Select at least one file (gltf + optional .bin/textures).');
        return;
      }

      // Find primary model file (.gltf, .glb, .obj, .stl) if present; otherwise use the first file
      let mainFile = files.find(f => /\.(gltf|glb|obj|stl)$/i.test(f.name)) || files[0];

      // Create object URLs for all files so referenced resources (.bin, textures) can be resolved
      const fileMap = {};
      files.forEach(f => {
        fileMap[f.name] = URL.createObjectURL(f);
      });

      // Send the main file URL plus the mapping of filenames->objectURLs
      window.opener.postMessage({
        action: 'import',
        sourceType: 'file-multi',
        url: fileMap[mainFile.name],
        files: fileMap,
        name: mainFile.name
      }, '*');

      // Close after a short delay to allow opener to begin loading
      setTimeout(() => { window.close(); }, 300);
    });

    sendUrlBtn.addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (!url) {
        alert('Enter a URL.');
        return;
      }
      window.opener.postMessage({ action: 'import', sourceType: 'url', url: url, name: url.split('/').pop() }, '*');
      setTimeout(() => { window.close(); }, 300);
    });

    closeBtn.addEventListener('click', () => window.close());
  </script>
</body>
</html>
