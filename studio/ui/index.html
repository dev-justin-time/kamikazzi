<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProModeler Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../marketplace/marketplace.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; color: #eee; font: 13px/1.4 system-ui, sans-serif; }
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
    #viewport { flex: 1; position: relative; overflow: hidden; background: #1a1a1a; }
    #viewport canvas { display: block; width: 100% !important; height: 100% !important; }
    #loadingOverlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 9999;
      background: #111; display: flex; justify-content: center; align-items: center;
      transition: opacity .4s;
    }
    #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
    .loading-content { text-align: center; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4a9eff;
      border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-content p { color: #888; font-size: 14px; }
    .sh-tooltip {
      position: fixed; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: #222; color: #eee; padding: 4px 10px; border-radius: 4px;
      font-size: 11px; white-space: nowrap; pointer-events: none; z-index: 9999;
      border: 1px solid #444; margin-bottom: 4px;
    }
    .popup-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1000; background: rgba(0,0,0,0.6);
      justify-content: center; align-items: center;
    }
    .popup-overlay.open { display: flex; }
    .popup-content {
      background: #1e1e2e; border-radius: 8px; border: 1px solid #444;
      min-width: 320px; max-width: 500px; max-height: 80vh; overflow-y: auto;
      padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .popup-content h2 { font-size: 16px; font-weight: 600; color: #eee; margin-bottom: 16px; }
    .popup-content .ctrl-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .popup-content .ctrl-label { font-size: 12px; color: #aaa; }
    .popup-content .ctrl-desc { font-size: 11px; color: #666; margin-top: -2px; }
    .popup-content input[type="range"] { width: 100%; accent-color: #4a9eff; }
    .popup-content input[type="number"],
    .popup-content select {
      width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #444;
      background: #222; color: #eee;
    }
    .popup-content input[type="color"] { width: 100%; padding: 4px; border-radius: 4px; border: 1px solid #444; background: #222; }
    .popup-content input[type="checkbox"] { width: 18px; height: 18px; accent-color: #4a9eff; }
    .popup-content .btn { 
      margin-top: 16px; width: 100%; padding: 10px; border: none; border-radius: 6px;
      background: #4a9eff; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .popup-content .btn:hover { background: #3a8eef; }
    .popup-content .ctrl-row { display: flex; align-items: center; gap: 8px; }
    .popup-content .ctrl-row .ctrl-label { margin-bottom: 0; }
    .icon-bar {
      display: flex; align-items: center; gap: 2px; padding: 4px 8px;
      background: #1a1a2e; border-bottom: 1px solid #333;
      min-height: 44px; overflow-x: auto; flex-shrink: 0;
    }
    .icon-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 4px 8px; border: none; border-radius: 4px;
      background: transparent; color: #aaa; cursor: pointer;
      font-size: 10px; transition: all .15s; white-space: nowrap; position: relative;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .icon-btn .ico { font-size: 18px; line-height: 1; }
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 12px; background: #0d0d1a; border-top: 1px solid #333;
      font-size: 11px; color: #888; flex-shrink: 0; min-height: 24px;
    }
    .val-display { font-size: 11px; color: #888; text-align: right; }
  </style>
</head>
<body>
  <div id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>Loading ProModeler Studio...</p>
    </div>
  </div>

  <div id="app">
    <!-- Icon Bar (rendered by shell) -->
    <div id="iconBar" class="icon-bar"></div>
    <!-- 3D Viewport -->
    <div id="viewport"></div>
    <!-- Status Bar -->
    <div id="statusBar" class="status-bar">
      <span id="statusLeft">Ready</span>
      <span id="statusRight">FPS: 0</span>
    </div>
  </div>

  <!-- Popup Overlay (for feature pages) -->
  <div id="popupOverlay" class="popup-overlay">
    <div id="popupContent" class="popup-content"></div>
  </div>

  <!-- Hidden file inputs -->
  <input id="modelImport" type="file" accept=".gltf,.glb,.gltf,.obj,.stl,.k3dasset" style="display:none" />
  <input id="projectOpen" type="file" accept=".json" style="display:none" />

  <!-- Boot error banner -->
  <script>
    (function(){
      window.addEventListener('error', function(e) {
        var el = document.getElementById('bootErrorBanner');
        if (!el) {
          el = document.createElement('div');
          el.id = 'bootErrorBanner';
          el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#300;color:#f88;font:12px/1.4 monospace;padding:8px 12px;border-bottom:1px solid #a00;white-space:pre-wrap';
          document.body.appendChild(el);
        }
        el.textContent = '[Boot Error] ' + (e.message || 'Unknown error') + (e.filename ? ' at ' + e.filename + ':' + e.lineno : '');
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('bootErrorBanner') || (function(){
          var d=document.createElement('div');d.id='bootErrorBanner';d.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#300;color:#f88;font:12px/1.4 monospace;padding:8px 12px;border-bottom:1px solid #a00;white-space:pre-wrap';document.body.appendChild(d);return d;
        })();
        el.textContent = '[Unhandled Rejection] ' + (e.reason?.message || String(e.reason || ''));
      });
    })();
  </script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/",
        "dat.gui": "https://unpkg.com/dat.gui@0.7.9/build/dat.gui.module.js",
        "nipplejs": "https://esm.sh/nipplejs@0.9.1",
        "cannon-es": "https://esm.sh/cannon-es@0.20.0",
        "jszip": "https://esm.sh/jszip@3.10.1"
      }
    }
  </script>

  <script type="module">
    // ── Imports ──
    import { state } from '../app/state.js';
    import { cache } from '../app/cache.js';
    import { aiBridge } from '../app/ai-bridge.js';

    // ── Icon definitions (shared with shell) ──
    const ICONS = [
      { id: 'file',       label: 'File',        icon: '📁', desc: 'New, open, save, export projects' },
      { id: 'select',     label: 'Select',      icon: '🎯', desc: 'Click, box, lasso selection tools' },
      { id: 'edit',       label: 'Edit',        icon: '✏️', desc: 'Transform, snap, mirror, slice, merge' },
      { id: 'transition', label: 'Transition',  icon: '🔄', desc: 'Tween, morph, interpolate objects' },
      { id: 'object',     label: 'Object',      icon: '🧊', desc: 'Add primitives, properties, hierarchy' },
      { id: 'texture',    label: 'Texture',     icon: '🎨', desc: 'UV mapping, bake, import textures' },
      { id: 'paint',      label: 'Paint',       icon: '🖌️', desc: 'Vertex & texture paint, layers' },
      { id: 'ai',         label: 'AI',          icon: '🤖', desc: 'AI generation, suggestions, texturing' },
      { id: 'rig',        label: 'Rig',         icon: '🦴', desc: 'Bones, FK/IK, skinning, weights' },
      { id: 'mocap',      label: 'Mocap',       icon: '🎬', desc: 'Motion capture import & retarget' },
      { id: 'animate',    label: 'Animate',     icon: '⏯️', desc: 'Timeline, keyframes, clips, playback' },
      { id: 'camera',     label: 'Camera',      icon: '📷', desc: 'Camera management, FOV, presets' },
      { id: 'lighting',   label: 'Lighting',    icon: '💡', desc: 'Lights, HDRI, environment' },
      { id: 'game',       label: 'Game',        icon: '🎮', desc: 'Game mode export, physics setup' },
      { id: 'map',        label: 'Map',         icon: '🗺️', desc: 'Terrain generation, level editing' },
      { id: 'inventory',  label: 'Inventory',   icon: '📦', desc: 'Asset library, materials, textures' },
      { id: 'market',     label: 'Market',      icon: '🏪', desc: 'Asset marketplace, purchases' },
      { id: 'profile',    label: 'Profile',     icon: '👤', desc: 'User settings, preferences' },
      { id: 'chat',       label: 'Chat',        icon: '💬', desc: 'Collaboration, comments, AI chat' },
    ];

    // ── Helpers ──
    const $ = (id) => document.getElementById(id);
    const popupOverlay = $('popupOverlay');
    const popupContent = $('popupContent');
    let activePopup = null;

    function renderControls(container, controls) {
      container.innerHTML = '';
      if (!controls) return;
      controls.forEach(ctrl => {
        const group = document.createElement('div');
        group.className = 'ctrl-group';
        if (ctrl.key) group.dataset.key = ctrl.key;

        const label = document.createElement('div');
        label.className = 'ctrl-label';
        label.textContent = ctrl.label;

        let input;
        switch (ctrl.type) {
          case 'slider': {
            input = document.createElement('input');
            input.type = 'range';
            Object.assign(input, { min: ctrl.min ?? 0, max: ctrl.max ?? 1, step: ctrl.step ?? 0.01, value: ctrl.default ?? 0.5 });
            const val = document.createElement('div');
            val.className = 'val-display';
            val.textContent = input.value;
            input.addEventListener('input', () => { val.textContent = input.value; ctrl.onChange?.(parseFloat(input.value)); });
            group.appendChild(label);
            group.appendChild(input);
            group.appendChild(val);
            break;
          }
          case 'number': {
            input = document.createElement('input');
            input.type = 'number';
            input.value = ctrl.default ?? 0;
            input.addEventListener('change', () => ctrl.onChange?.(parseFloat(input.value)));
            group.appendChild(label);
            group.appendChild(input);
            break;
          }
          case 'color': {
            input = document.createElement('input');
            input.type = 'color';
            input.value = ctrl.default ?? '#ffffff';
            input.addEventListener('input', () => ctrl.onChange?.(input.value));
            group.appendChild(label);
            group.appendChild(input);
            break;
          }
          case 'select': {
            input = document.createElement('select');
            (ctrl.options || []).forEach(o => {
              const opt = document.createElement('option');
              opt.value = o.value; opt.textContent = o.label; input.appendChild(opt);
            });
            input.addEventListener('change', () => ctrl.onChange?.(input.value));
            group.appendChild(label);
            group.appendChild(input);
            break;
          }
          case 'toggle': {
            group.className = 'ctrl-group ctrl-row';
            input = document.createElement('input');
            input.type = 'checkbox';
            input.checked = ctrl.default ?? false;
            input.addEventListener('change', () => ctrl.onChange?.(input.checked));
            group.appendChild(input);
            group.appendChild(label);
            break;
          }
          case 'button': {
            input = document.createElement('button');
            input.className = 'btn';
            input.textContent = ctrl.label;
            input.addEventListener('click', () => ctrl.onClick?.());
            group.appendChild(input);
            break;
          }
          case 'label': {
            input = document.createElement('div');
            input.className = 'ctrl-label';
            input.textContent = ctrl.label;
            input.style.cssText = 'font-size:11px;color:#555;text-align:center;padding:4px 0;border-top:1px solid #333;';
            group.appendChild(input);
            break;
          }
          default: return;
        }

        if (ctrl.description) {
          const desc = document.createElement('div');
          desc.className = 'ctrl-desc';
          desc.textContent = ctrl.description;
          group.appendChild(desc);
        }

        container.appendChild(group);
      });
    }

    async function openPopup(id, label) {
      if (activePopup === id) { closePopup(); return; }

      // Show loading
      popupContent.innerHTML = `<h2>${label}</h2><div style="text-align:center;padding:20px;color:#666">Loading...</div>`;
      popupOverlay.classList.add('open');
      activePopup = id;

      try {
        const mod = await import(`../features/${id}/page.js`);
        popupContent.innerHTML = '';
        const header = document.createElement('h2');
        header.textContent = label;
        popupContent.appendChild(header);

        // Build controls
        const controlsContainer = document.createElement('div');
        popupContent.appendChild(controlsContainer);
        renderControls(controlsContainer, mod.meta?.controls);

        // OK button
        const ok = document.createElement('button');
        ok.className = 'btn';
        ok.textContent = 'OK ✓';
        ok.addEventListener('click', () => {
          mod.meta?.onApply?.(state, window.ProModelerApp);
          closePopup();
        });
        popupContent.appendChild(ok);
      } catch (e) {
        popupContent.innerHTML = `<h2>${label}</h2><p style="color:#888;padding:12px">Feature page loading...<br><span style="font-size:11px">${e.message}</span></p>`;
        const ok = document.createElement('button');
        ok.className = 'btn';
        ok.textContent = 'OK ✓';
        ok.addEventListener('click', closePopup);
        popupContent.appendChild(ok);
      }
    }

    function closePopup() {
      popupOverlay.classList.remove('open');
      activePopup = null;
    }

    // Close popup on overlay click
    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) closePopup();
    });

    // ── Render Icon Bar ──
    const iconBar = $('iconBar');
    ICONS.forEach(({ id, label, icon, desc }) => {
      const btn = document.createElement('button');
      btn.className = 'icon-btn';
      btn.innerHTML = `<span class="ico">${icon}</span><span>${label}</span>`;

      // Tooltip on hover
      let tip = null;
      btn.addEventListener('mouseenter', () => {
        tip = document.createElement('div');
        tip.className = 'sh-tooltip';
        tip.textContent = desc;
        // Position relative to viewport
        const rect = btn.getBoundingClientRect();
        tip.style.left = rect.left + rect.width / 2 + 'px';
        tip.style.bottom = (window.innerHeight - rect.top) + 4 + 'px';
        document.body.appendChild(tip);
      });
      btn.addEventListener('mouseleave', () => { tip?.remove(); tip = null; });

      btn.addEventListener('click', () => openPopup(id, label));
      iconBar.appendChild(btn);
    });

    // ── Initialize Engine (3D) ──
    async function initEngine() {
      try {
        const { Studio } = await import('../app/studio.js');
        window.ProModelerApp = new Studio();
        $('statusRight').textContent = 'FPS: 60';
        $('statusLeft').textContent = 'Ready';
      } catch (e) {
        console.error('Engine init failed:', e);
        $('statusLeft').textContent = 'Engine Error';
        $('statusRight').textContent = 'FAILED';
        const banner = document.getElementById('bootErrorBanner');
        if (banner) banner.textContent = '[Engine Error] ' + (e.message || 'Unknown');
      }
    }

    // ── AI Bridge ──
    try {
      aiBridge.init();
    } catch (e) {
      console.warn('AI Bridge init deferred:', e.message);
    }

    // ── Store refs in state ──
    state.set('viewport', $('viewport'));
    state.set('shell', { openPopup, closePopup, setStatus: (l, r) => { if (l) $('statusLeft').textContent = l; if (r) $('statusRight').textContent = r; } });

    // ── Boot ──
    initEngine().finally(() => {
      $('loadingOverlay').classList.add('hidden');
    });
  </script>
</body>
</html>
